<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CSS Fidget Spinner</title>
    <link rel="stylesheet" href="fidget-spinner.css">
</head>

<body>

    <h1>CSS Fidget Spinner</h1>

    <div class="container">

        <p class="spin-text">
            Move your mouse over this text to spin the fidget spinner.
        </p>

        <img src="../images/fidget-spinner.png"
             alt="Fidget Spinner"
             class="spinner">

    </div>

</body>

</html>
